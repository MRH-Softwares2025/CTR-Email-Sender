services:
  - type: web
    name: ctr-email-sender
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: HTTPS_ONLY
        value: "true"
      - key: SESSION_SECURE
        value: "true"
      - key: DISABLE_SUBSCRIPTION_CHECK
        value: "false"
      - key: SECRET_KEY
        generateValue: true
